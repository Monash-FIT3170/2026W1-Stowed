name: CI

on:
  push:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies and run tests
        run: |
          curl https://install.meteor.com/?release=3.0.4 | sh
          export PATH="$HOME/.meteor:$PATH"
          cd Stowed
          npm ci
          npm test
