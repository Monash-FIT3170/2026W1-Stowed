name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run Meteor tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Meteor
        run: curl https://install.meteor.com/ | sh

      - name: Add Meteor to PATH
        run: echo "$HOME/.meteor" >> $GITHUB_PATH

      - name: Cache Meteor packages
        uses: actions/cache@v4
        with:
          path: ~/.meteor/packages
          key: meteor-packages-${{ hashFiles('.meteor/versions') }}
          restore-keys: |
            meteor-packages-

      - name: Install npm dependencies
        run: meteor npm install --frozen-lockfile

      - name: Run unit tests
        run: meteor test --once --driver-package meteortesting:mocha
        env:
          TEST_BROWSER_DRIVER: puppeteer
          MOCHA_REPORTER: spec
